services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - db_data:/data
    environment:
      - SECRET_KEY=change-me-in-production
      - DATABASE_URL=sqlite:////data/app.db
      - FLASK_APP=app
      - ADMIN_PASSWORD=change-me-in-production
    restart: unless-stopped

volumes:
  db_data:
